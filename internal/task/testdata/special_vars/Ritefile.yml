version: '3'

includes:
  included:
    taskfile: ./included
    dir: ./included

tasks:
  print-task:
    aliases: [echo-task]
    cmds:
      - echo {{.TASK}}
  print-root-dir: echo {{.ROOT_DIR}}
  print-root-taskfile: echo {{.ROOT_RITEFILE}}
  print-taskfile: echo {{.RITEFILE}}
  print-taskfile-dir: echo {{.RITEFILE_DIR}}
  print-task-version: echo {{.RITE_VERSION}}
  print-task-alias:
    aliases: [echo-task-alias]
    cmds:
      - echo "{{.ALIAS}}"
  print-task-alias-default: echo "{{.ALIAS}}"
  print-task-dir:
    dir: 'foo'
    cmd: echo {{.TASK_DIR}}
