name: Test

on:
  pull_request:
  push:
    tags:
      - v*
    branches:
      - main

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.x]
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{matrix.platform}}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go ${{matrix.go-version}}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{matrix.go-version}}

      - name: Test
        run: go run ./cmd/rite test

  race:
    # Race detector is Linux-only here on purpose: it's slower and flakier on
    # macOS/Windows, and the goal is "catch the obvious races on every PR,"
    # not exhaustive cross-platform coverage. The package list is explicit
    # rather than ./... because two packages currently fail under -race:
    # internal/output (root cause is templater.Cache lazy-init, #52) and
    # internal/task (test fixtures share a bytes.Buffer across parallel
    # runDeps, #56). Add them to this list once those issues land.
    name: Race
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go 1.26.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - name: Test (race)
        run: |
          go test -race -timeout 10m \
            ./args/... \
            ./internal/fingerprint/... \
            ./internal/slicesext/... \
            ./internal/sort/... \
            ./internal/summary/... \
            ./internal/templater/... \
            ./riterc/... \
            ./taskfile/...
