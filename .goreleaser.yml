# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

# Free goreleaser only (no -pro). Upstream used the pro distribution for
# Cloudsmith / nightly source archives / some template features — rite
# doesn't need any of that yet. If we end up wanting pro features later,
# the release.yml toggle is a one-line change.

project_name: rite

builds:
  - binary: rite
    main: ./cmd/rite
    goos:
      - windows
      - darwin
      - linux
      - freebsd
    goarch:
      - '386'
      - amd64
      - arm
      - arm64
      - riscv64
    goarm:
      - '6'
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: riscv64
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
      - "-X github.com/clintmod/rite/internal/version.version={{.Version}}"

gomod:
  proxy: true

archives:
  - name_template: '{{.Binary}}_{{.Os}}_{{.Arch}}'
    files:
      - README.md
      - LICENSE
      - NOTICE
      - internal/task/completion/**/*
    format_overrides:
      - goos: windows
        formats: [zip]

snapshot:
  version_template: '{{.Version}}'

checksum:
  name_template: 'rite_checksums.txt'

nfpms:
  - vendor: clintmod
    homepage: https://github.com/clintmod/rite
    maintainer: Clint Modien <cmodien@gmail.com>
    description: >-
      An idempotent task runner with Unix-native variable precedence. A hard
      fork of go-task where first-in-wins semantics mean shell env, CLI args,
      and outer scopes actually win over inner scopes — the inverse of
      upstream's model.
    section: devel
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    file_name_template: '{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}'
    contents:
      - src: internal/task/completion/bash/task.bash
        dst: /etc/bash_completion.d/rite
      - src: internal/task/completion/fish/task.fish
        dst: /usr/share/fish/completions/rite.fish
      - src: internal/task/completion/zsh/_task
        dst: /usr/local/share/zsh/site-functions/_rite

brews:
  - name: rite
    description: Task runner with Unix-native variable precedence (hard fork of go-task).
    license: MIT
    homepage: https://github.com/clintmod/rite
    directory: Formula
    repository:
      owner: clintmod
      name: homebrew-tap
      # HOMEBREW_TAP_TOKEN is a PAT scoped to clintmod/homebrew-tap only
      # (see release.yml). GITHUB_TOKEN handles the release on this repo,
      # HOMEBREW_TAP_TOKEN handles the commit on the tap.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    test: system "#{bin}/rite", "--help"
    install: |-
      bin.install "rite"
      bash_completion.install "internal/task/completion/bash/task.bash" => "rite"
      zsh_completion.install "internal/task/completion/zsh/_task" => "_rite"
      fish_completion.install "internal/task/completion/fish/task.fish" => "rite.fish"
    commit_author:
      name: clintmod
      email: cmodien@gmail.com

release:
  github:
    owner: clintmod
    name: rite
  # Auto-publish on tag. The draft: true default was useful for the first
  # tag where we wanted to inspect artifacts before the world saw them,
  # but it also hides the release from public APIs — mise's ubi/github
  # backends couldn't resolve `clintmod/rite@v0.1.0` until the draft was
  # manually promoted. Set back to `true` in a commit if we want the
  # safety net per release.
  draft: false
  prerelease: auto
