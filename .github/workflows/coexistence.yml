name: Coexistence

on:
  pull_request:
    paths:
      - 'scripts/coexistence/**'
      - 'Ritefile.yml'
      - 'internal/task/setup.go'
      - 'taskrc/**'
      - '.dockerignore'
      - '.github/workflows/coexistence.yml'
  push:
    tags:
      - v*
    branches:
      - main

jobs:
  coexistence:
    name: Coexistence
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - name: Dockerized dual-install smoke
        run: go run ./cmd/rite verify:coexistence
