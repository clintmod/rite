name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # goreleaser needs this to create GitHub releases

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          # Free goreleaser (no `distribution: goreleaser-pro`). Drops
          # cloudsmith / nightly-only features we don't use yet.
          version: latest
          # `--skip=homebrew` NOT set here — a real release does publish
          # the brew formula. That requires:
          #   1. clintmod/homebrew-tap repo exists with at least one commit.
          #   2. A PAT with `repo` scope on that tap is set as GH_PAT.
          # If either is missing when a tag lands, run locally with
          #   goreleaser release --skip=homebrew
          # to ship everything else, then unblock brew in a follow-up.
          args: release --clean
        env:
          # Falls back to the job's default token if GH_PAT isn't set —
          # in that fallback mode only same-repo writes work, so the
          # brew step will fail fast with a clear error. Fine for
          # initial tags while the tap is being bootstrapped.
          GITHUB_TOKEN: ${{secrets.GH_PAT || secrets.GITHUB_TOKEN}}
