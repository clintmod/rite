name: Lint

on:
  pull_request:
  push:
    tags:
      - v*
    branches:
      - main

jobs:
  lint:
    name: Lint
    strategy:
      matrix:
        go-version: [1.26.x]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{matrix.go-version}}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

  lint-jsonschema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install check-jsonschema
        run: python -m pip install 'check-jsonschema==0.27.3'

      - name: verify schema is up-to-date with AST
        run: |
          go run ./cmd/gen-schema > /tmp/rite-schema.json
          diff -u website/src/public/schema.json /tmp/rite-schema.json || {
            echo "::error::schema.json is stale. Run 'rite gen:schema' and commit the result."
            exit 1
          }

      - name: check-jsonschema (metaschema)
        run: check-jsonschema --check-metaschema website/src/public/schema.json

      - name: check-jsonschema (validate test fixtures against schema)
        run: |
          # Find every Ritefile in testdata and validate it against our schema.
          # empty_taskfile/ is a 0-byte file that tests rite's empty-file error
          # path — it correctly fails schema validation too, so exclude it.
          find internal/task/testdata -type f \( -name 'Ritefile.yml' -o -name 'Ritefile.yaml' \) \
            ! -path '*empty_taskfile*' \
            -print0 | xargs -0 -n1 check-jsonschema --schemafile website/src/public/schema.json
