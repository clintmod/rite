version: '3'

# Website is a VitePress project under website/ driven by pnpm scripts,
# not a rite sub-Ritefile. See website/package.json and the
# Docs (GitHub Pages) workflow in .github/workflows/pages.yml.

vars:
  BIN: "{{.ROOT_DIR}}/bin"
  GOTESTSUM_FORMAT: '{{if .CI}}github-actions{{else}}pkgname{{end}}'

env:
  CGO_ENABLED: '0'

tasks:
  default:
    cmds:
      - task: lint
      - task: test

  run:
    desc: Runs Task
    cmds:
      - go run ./cmd/rite {{.CLI_ARGS}}

  install:
    desc: Installs rite and ensures the binary is on PATH (XDG-first symlink fallback)
    aliases: [i]
    cmds:
      - go install -v ./cmd/rite
      # The preprocessor honors POSIX quoting (#121), so $PATH / $HOME inside the
      # case statements (which are double-quoted strings) and inside the <<'HELP'
      # quoted heredoc pass through to bash unchanged. Only the bare double-quoted
      # cases (e.g. *":$PATH:"*) get rite-substituted at parse time, which is what
      # the case-match relies on anyway.
      - |
        set -e
        gobin=$(go env GOBIN)
        [ -z "$gobin" ] && gobin="$(go env GOPATH)/bin"
        target="$gobin/rite"
        case ":$PATH:" in
          *":$gobin:"*)
            echo "rite -> $target (on PATH)"
            exit 0
            ;;
        esac
        for cand in "$HOME/.local/bin" "$HOME/bin" "/usr/local/bin"; do
          case ":$PATH:" in
            *":$cand:"*)
              mkdir -p "$cand"
              ln -sf "$target" "$cand/rite"
              echo "rite -> $cand/rite (symlink to $target)"
              exit 0
              ;;
          esac
        done
        sed -e "s|__T__|$target|g" -e "s|__G__|$gobin|g" >&2 <<'HELP'
        rite installed at __T__ but no candidate dir is on PATH.
        Add one of these to your shell rc and re-run 'rite install':
          export PATH="$HOME/.local/bin:$PATH"   # XDG (recommended)
          export PATH="$HOME/bin:$PATH"          # legacy Unix
          export PATH="__G__:$PATH"              # GOBIN/GOPATH
        HELP
        exit 1

  uninstall:
    desc: Removes rite (go clean + only candidate symlinks pointing at our binary); idempotent
    cmds:
      - go clean -i ./cmd/rite
      # Only rm a candidate path if it's a symlink that resolves to *our* installed
      # binary, OR if it's a dangling symlink whose raw target lives under our
      # $gobin (i.e. one of ours, just stale). Anything else — a brew-managed
      # symlink resolving into the Cellar, a hand-placed regular file, an
      # unrelated dangling link — is reported as "skipped" and left untouched.
      #
      # `readlink -f` is GNU and is in modern macOS BSD readlink, but absent on
      # older macOS, Alpine's busybox, and some embedded Linux. The `resolve()`
      # helper tries `-f` first and falls back to a manual symlink-chain walk
      # using one-arg `readlink` + cd/pwd -P, which is in every POSIX shell.
      - |
        set -e
        gobin=$(go env GOBIN)
        [ -z "$gobin" ] && gobin="$(go env GOPATH)/bin"
        target="$gobin/rite"
        resolve() {
          local p="$1" out t
          out=$(readlink -f "$p" 2>/dev/null) && [ -n "$out" ] && { echo "$out"; return; }
          while [ -L "$p" ]; do
            t=$(readlink "$p") || break
            case "$t" in
              /*) p="$t" ;;
              *)  p="$(cd "$(dirname "$p")" 2>/dev/null && pwd -P)/$t" ;;
            esac
          done
          if [ -e "$p" ]; then
            echo "$(cd "$(dirname "$p")" 2>/dev/null && pwd -P)/$(basename "$p")"
          else
            echo "$p"
          fi
        }
        removed=0
        skipped=0
        for cand in "$HOME/.local/bin/rite" "$HOME/bin/rite" "/usr/local/bin/rite"; do
          if [ ! -L "$cand" ] && [ ! -e "$cand" ]; then
            continue
          fi
          if [ ! -L "$cand" ]; then
            echo "skipped $cand (regular file, not a symlink we created)"
            skipped=$((skipped + 1))
            continue
          fi
          if [ ! -e "$cand" ]; then
            raw=$(readlink "$cand")
            case "$raw" in
              "$gobin"/*)
                rm -f "$cand"
                echo "removed $cand (dangling, was -> $raw)"
                removed=$((removed + 1))
                ;;
              *)
                echo "skipped $cand (dangling, points to $raw — not under $gobin)"
                skipped=$((skipped + 1))
                ;;
            esac
            continue
          fi
          resolved=$(resolve "$cand")
          if [ "$resolved" = "$target" ]; then
            rm -f "$cand"
            echo "removed $cand"
            removed=$((removed + 1))
          else
            echo "skipped $cand (points to $resolved, not $target)"
            skipped=$((skipped + 1))
          fi
        done
        echo "uninstall done (removed $removed, skipped $skipped)"

  generate:
    aliases: [gen, g]
    desc: Runs all generate tasks
    cmds:
      - task: generate:mocks
      - task: generate:fixtures
      - task: generate:schema

  generate:schema:
    desc: Regenerates both the unversioned and versioned JSON Schemas (served at clintmod.github.io/rite/schema.json and /schema/v3.json)
    aliases: [gen:schema, g:schema]
    sources:
      - "taskfile/ast/**/*.go"
      - "cmd/gen-schema/main.go"
    generates:
      - "website/src/public/schema.json"
      - "website/src/public/schema/v3.json"
    cmds:
      - mkdir -p website/src/public/schema
      - go run ./cmd/gen-schema > website/src/public/schema.json
      - go run ./cmd/gen-schema -id https://clintmod.github.io/rite/schema/v3.json > website/src/public/schema/v3.json

  generate:mocks:
    desc: Runs Mockery to create mocks
    aliases: [gen:mocks, g:mocks]
    deps: [install:mockery]
    sources:
      - "internal/fingerprint/checker.go"
    generates:
      - "internal/mocks/*.go"
    cmds:
      - find . -type f -name *_mock.go -delete
      - "{{.BIN}}/mockery"

  generate:fixtures:
    desc: Runs tests and generates golden fixture files
    aliases: [gen:fixtures, g:fixtures]
    env:
      GOLDIE_UPDATE: 'true'
      GOLDIE_TEMPLATE: 'true'
    cmds:
      - find ./internal/task/testdata -name '*.golden' -delete
      - go test ./...

  install:mockery:
    desc: Installs mockgen; a tool to generate mock files
    vars:
      MOCKERY_VERSION: v3.2.2
    env:
      GOBIN: "{{.BIN}}"
    status:
      - go version -m {{.BIN}}/mockery | grep github.com/vektra/mockery | grep {{.MOCKERY_VERSION}}
    cmds:
      - GOBIN="{{.BIN}}" go install github.com/vektra/mockery/v3@{{.MOCKERY_VERSION}}

  hooks:install:
    desc: Enables the tracked git hooks in .githooks/ (runs golangci-lint on pre-push)
    aliases: [hooks]
    status:
      - test "$(git config --get core.hooksPath)" = ".githooks"
    cmds:
      - git config --local core.hooksPath .githooks
      - echo "enabled .githooks — pre-push will run golangci-lint on Go changes"

  mod:
    desc: Downloads and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  clean:
    desc: Cleans temp files and folders
    aliases: [clear]
    cmds:
      - rm -rf dist/
      - rm -rf tmp/

  lint:
    desc: Runs golangci-lint
    aliases: [l]
    sources:
      - './**/*.go'
      - .golangci.yml
      - go.mod
    cmds:
      - golangci-lint run

  lint:fix:
    desc: Runs golangci-lint and fixes any issues
    sources:
      - './**/*.go'
      - .golangci.yml
      - go.mod
    cmds:
      - golangci-lint run --fix

  format:
    desc: Runs golangci-lint and formats any Go files
    aliases: [fmt, f]
    sources:
      - './**/*.go'
      - .golangci.yml
    cmds:
      - golangci-lint fmt

  sleepit:build:
    desc: Builds the sleepit test helper
    sources:
      - ./cmd/sleepit/**/*.go
    generates:
      - "{{.BIN}}/sleepit"
    cmds:
      - go build -o {{.BIN}}/sleepit{{exeExt}} ./cmd/sleepit

  sleepit:run:
    desc: Builds the sleepit test helper
    deps: [sleepit:build]
    cmds:
      - "{{.BIN}}/sleepit {{.CLI_ARGS}}"
    silent: true

  test:
    desc: Runs test suite
    aliases: [t]
    deps: [gotestsum:install]
    sources:
      - "**/*.go"
      - "internal/task/testdata/**/*"
      - internal/version/version.txt   # //go:embed'd; version_test.go asserts on its value
    cmds:
      - gotestsum -f '{{.GOTESTSUM_FORMAT}}' ./...

  test:watch:
    desc: Runs test suite with watch tests included
    deps: [sleepit:build, gotestsum:install]
    cmds:
      - gotestsum -f '{{.GOTESTSUM_FORMAT}}' ./... -tags 'watch'

  test:all:
    desc: Runs test suite with signals and watch tests included
    deps: [sleepit:build, gotestsum:install]
    cmds:
      - gotestsum -f '{{.GOTESTSUM_FORMAT}}' -tags 'signals watch' ./...

  goreleaser:test:
    desc: Tests release process without publishing
    cmds:
      - goreleaser --snapshot --clean

  verify:coexistence:
    desc: Dockerized dual-install smoke — asserts rite and go-task don't corrupt each other (the v1.0 coexistence gate)
    aliases: [coexistence]
    cmds:
      - docker build -t rite-coexistence -f scripts/coexistence/Dockerfile .
      - docker run --rm rite-coexistence

  examples:verify:
    desc: Parses every examples/{recipes,migrated}/*/Ritefile.yml via rite -l (no exec) to catch drift from the live binary
    aliases: [examples]
    deps: [install]
    cmds:
      - |
        set -e
        found=0
        for subtree in examples/recipes examples/migrated; do
          [ -d "$subtree" ] || continue
          for dir in "$subtree"/*/; do
            [ -f "$dir/Ritefile.yml" ] || continue
            echo "==> $dir"
            (cd "$dir" && rite -l >/dev/null)
            found=$((found + 1))
          done
        done
        echo "examples:verify — parsed $found Ritefile(s)"

  gotestsum:install:
    desc: Installs gotestsum
    status:
      - command -v gotestsum
    cmds:
      - go install gotest.tools/gotestsum@latest

  goreleaser:install:
    desc: Installs goreleaser
    cmds:
      - go install github.com/goreleaser/goreleaser/v2@latest

  gorelease:install:
    desc: "Installs gorelease: https://pkg.go.dev/golang.org/x/exp/cmd/gorelease"
    status:
      - command -v gorelease
    cmds:
      - go install golang.org/x/exp/cmd/gorelease@latest

  api:check:
    desc: Checks what changes have been made to the public API
    deps: [gorelease:install]
    vars:
      LATEST:
        sh: git describe --tags --abbrev=0
    cmds:
      - gorelease -base={{.LATEST}}

  release:prepare:
    desc: "Stage a release PR — bumps version examples, dates the CHANGELOG, opens the PR. Pass VERSION=X.Y.Z (no v prefix)."
    summary: |
      Codifies the "## Pre-tag audit" half of RELEASING.md.

      Refuses cleanly if branch release/v$VERSION already exists (locally or
      remote). Re-runnable only after the prior staging branch is deleted.

      Steps:
        1. Validate VERSION (semver, no v-prefix), tree state, main is current.
        2. Run rite test + rite lint locally; refuse on any failure.
        3. Confirm latest CI on origin/main is green.
        4. Cut release/v$VERSION off origin/main.
        5. Bump internal/version/version.txt, install-example version pins,
           insert new dated section in CHANGELOG.md (preserves [Unreleased]).
        6. Commit, push branch, open draft PR titled "release: stage v$VERSION".

      Hand-offs left for the human (intentional):
        - Filling in the one-line release-summary blurb in CHANGELOG.
        - Reviewing + merging the PR.
      After merge, run `rite release:tag VERSION=$VERSION`.
    requires:
      vars: [VERSION]
    preconditions:
      - sh: 'printf %s "{{.VERSION}}" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "VERSION must be semver X.Y.Z (no v prefix). Got: {{.VERSION}}"
      - sh: 'test "$(git rev-parse --abbrev-ref HEAD)" = "main"'
        msg: "release:prepare must run from main"
      - sh: 'test -z "$(git status --porcelain)"'
        msg: "Working tree must be clean"
      - sh: 'git fetch -q origin && test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"'
        msg: "Local main must match origin/main exactly. Run: git pull origin main"
      - sh: '! git rev-parse --verify --quiet "release/v{{.VERSION}}" >/dev/null'
        msg: "Local branch release/v{{.VERSION}} already exists. Delete it (git branch -D release/v{{.VERSION}}) or pick a different VERSION."
      - sh: '! git ls-remote --exit-code --heads origin "release/v{{.VERSION}}" >/dev/null 2>&1'
        msg: "Remote branch release/v{{.VERSION}} already exists on origin. Close the existing PR / delete the branch, then re-run."
      - sh: '! git rev-parse --verify --quiet "v{{.VERSION}}" >/dev/null'
        msg: "Tag v{{.VERSION}} already exists locally — that version has already shipped. Pick the next patch/minor."
      - sh: '! git ls-remote --exit-code --tags origin "v{{.VERSION}}" >/dev/null 2>&1'
        msg: "Tag v{{.VERSION}} already exists on origin — that version has already shipped."
    cmds:
      - task: _release:audit
      - task: _release:bump
        vars:
          VERSION: "{{.VERSION}}"
      - cmd: |
          set -e
          branch="release/v{{.VERSION}}"
          git checkout -b "$branch"
          git add CHANGELOG.md README.md website/src/getting-started.md website/src/index.md website/src/ci.md website/src/special-vars.md internal/version/version.txt
          git commit -m "release: stage v{{.VERSION}}"
          git push -u origin "$branch"
          gh pr create --repo clintmod/rite \
            --base main --head "$branch" \
            --title "release: stage v{{.VERSION}}" \
            --body "Staging branch for v{{.VERSION}}.

          - [ ] Fill in CHANGELOG.md \`## [{{.VERSION}}]\` summary blurb
          - [ ] CI green
          - [ ] Squash-merge

          After merge: \`rite release:tag VERSION={{.VERSION}}\` then \`rite release:verify VERSION={{.VERSION}}\`."
          echo
          echo "release:prepare done. Next: edit CHANGELOG blurb, get CI green, merge PR, then:"
          echo "  rite release:tag VERSION={{.VERSION}}"

  release:tag:
    desc: "Tag the merged release commit on main and push the tag (triggers goreleaser). Pass VERSION=X.Y.Z."
    summary: |
      Codifies the "## Tag" section of RELEASING.md.

      STRICT: refuses if v$VERSION already exists anywhere (local or remote).
      Never force-pushes. Validates that the merged release prep landed
      (CHANGELOG section dated, version.txt bumped) before pushing.
    requires:
      vars: [VERSION]
    preconditions:
      - sh: 'printf %s "{{.VERSION}}" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "VERSION must be semver X.Y.Z (no v prefix). Got: {{.VERSION}}"
      - sh: 'test "$(git rev-parse --abbrev-ref HEAD)" = "main"'
        msg: "release:tag must run from main"
      - sh: 'test -z "$(git status --porcelain)"'
        msg: "Working tree must be clean"
      - sh: 'git fetch -q origin && test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"'
        msg: "Local main must match origin/main. Run: git pull origin main"
      - sh: '! git rev-parse --verify --quiet "v{{.VERSION}}" >/dev/null'
        msg: "Tag v{{.VERSION}} already exists locally. Tags are immutable once published — pick a new patch."
      - sh: '! git ls-remote --exit-code --tags origin "v{{.VERSION}}" >/dev/null 2>&1'
        msg: "Tag v{{.VERSION}} already exists on origin. Tags are immutable once published — pick a new patch."
      - sh: 'test "$(cat internal/version/version.txt | tr -d "[:space:]")" = "v{{.VERSION}}"'
        msg: "internal/version/version.txt does not equal v{{.VERSION}}. Did the release:prepare PR get merged?"
      - sh: 'grep -Eq "^## \[{{.VERSION}}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md'
        msg: "CHANGELOG.md missing dated section '## [{{.VERSION}}] - YYYY-MM-DD'. Did the release:prepare PR get merged?"
    cmds:
      - cmd: |
          set -e
          git tag -a "v{{.VERSION}}" -m "rite v{{.VERSION}}"
          git push origin "v{{.VERSION}}"
          echo
          echo "Tag v{{.VERSION}} pushed. Goreleaser workflow should be running now."
          echo "Verify with:  rite release:verify VERSION={{.VERSION}}"

  release:verify:
    desc: "Poll for the goreleaser workflow + release artifacts after release:tag. Pass VERSION=X.Y.Z."
    summary: |
      Codifies the "## Post-tag verify" section of RELEASING.md.

      Polls the goreleaser workflow (up to ~10 min), then asserts the GitHub
      release page exists with archives. Reports progress each iteration.
      Read-only — safe to re-run.
    requires:
      vars: [VERSION]
    preconditions:
      - sh: 'printf %s "{{.VERSION}}" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "VERSION must be semver X.Y.Z (no v prefix). Got: {{.VERSION}}"
      - sh: 'git ls-remote --exit-code --tags origin "v{{.VERSION}}" >/dev/null 2>&1'
        msg: "Tag v{{.VERSION}} not found on origin. Run release:tag first."
    cmds:
      - cmd: |
          set -e
          tag="v{{.VERSION}}"
          echo "==> waiting for goreleaser workflow on $tag (timeout ~10 min)"
          deadline=$(( $(date +%s) + 600 ))
          status=""
          conclusion=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            line=$(gh run list --repo clintmod/rite --workflow release.yml --event push --limit 20 \
                     --json headBranch,status,conclusion,databaseId \
                     --jq ".[] | select(.headBranch == \"$tag\") | [.status, .conclusion, .databaseId] | @tsv" \
                     | head -n1)
            if [ -z "$line" ]; then
              echo "  (no goreleaser run for $tag yet — sleeping 15s)"
              sleep 15
              continue
            fi
            status=$(printf %s "$line" | cut -f1)
            conclusion=$(printf %s "$line" | cut -f2)
            run_id=$(printf %s "$line" | cut -f3)
            if [ "$status" = "completed" ]; then
              echo "  goreleaser run $run_id completed: $conclusion"
              break
            fi
            echo "  goreleaser run $run_id status=$status — sleeping 20s"
            sleep 20
          done
          if [ "$status" != "completed" ]; then
            echo "TIMEOUT: goreleaser workflow did not complete within 10 min."
            echo "Check: gh run list --repo clintmod/rite --workflow release.yml --limit 5"
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "FAIL: goreleaser conclusion=$conclusion"
            echo "Inspect: gh run view $run_id --repo clintmod/rite --log-failed"
            exit 1
          fi
      - cmd: |
          set -e
          tag="v{{.VERSION}}"
          echo "==> checking release page for $tag"
          if ! gh release view "$tag" --repo clintmod/rite >/dev/null 2>&1; then
            echo "FAIL: release page for $tag not found"
            exit 1
          fi
          assets=$(gh release view "$tag" --repo clintmod/rite --json assets --jq '.assets | length')
          echo "  release $tag has $assets assets"
          if [ "$assets" -lt 10 ]; then
            echo "FAIL: expected at least 10 assets (archives + checksums + packages), got $assets"
            exit 1
          fi
      - cmd: |
          set -e
          tag="v{{.VERSION}}"
          echo "==> checking Homebrew tap formula"
          if formula=$(gh api repos/clintmod/homebrew-tap/contents/Formula/rite.rb --jq .content 2>/dev/null | base64 -d); then
            if printf %s "$formula" | grep -Eq "$tag|{{.VERSION}}"; then
              echo "  formula references $tag"
            else
              echo "WARN: tap formula does not yet reference $tag (Homebrew bump may be in flight — re-run release:verify if needed)"
            fi
          else
            echo "WARN: could not read homebrew-tap formula (token scope or transient API failure)"
          fi
      - cmd: |
          echo
          echo "release:verify done for v{{.VERSION}}."
          echo "Manual residual checks (see RELEASING.md ## Post-tag verify):"
          echo "  - brew upgrade rite && rite --version  (on a dev box)"
          echo "  - go install github.com/clintmod/rite/cmd/rite@v{{.VERSION}} && rite --version"
          echo "  - clintmod.github.io/rite/ shows the new CHANGELOG section"

  _release:audit:
    desc: Internal — pre-tag audit (test, lint, CI green check). Used by release:prepare.
    internal: true
    cmds:
      - cmd: |
          set -e
          echo "==> rite test"
      - task: test
      - cmd: |
          set -e
          echo "==> rite lint"
      - task: lint
      - cmd: |
          set -e
          echo "==> latest CI on origin/main"
          # Pull the most recent push-event run on main and confirm conclusion=success.
          line=$(gh run list --repo clintmod/rite --branch main --event push --limit 1 \
                   --json status,conclusion,databaseId,workflowName \
                   --jq '.[0] | [.status, .conclusion, .databaseId, .workflowName] | @tsv')
          if [ -z "$line" ]; then
            echo "FAIL: no recent CI runs found on main"
            exit 1
          fi
          status=$(printf %s "$line" | cut -f1)
          conclusion=$(printf %s "$line" | cut -f2)
          run_id=$(printf %s "$line" | cut -f3)
          wf=$(printf %s "$line" | cut -f4)
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "FAIL: most recent main CI run ($wf #$run_id) is $status/$conclusion — fix before releasing"
            exit 1
          fi
          echo "  main CI green ($wf #$run_id)"

  _release:bump:
    desc: Internal — bump version.txt + install-example pins + CHANGELOG date. Used by release:prepare.
    internal: true
    requires:
      vars: [VERSION]
    cmds:
      - cmd: |
          set -e
          new="v{{.VERSION}}"
          old=$(cat internal/version/version.txt | tr -d '[:space:]')
          today=$(date +%Y-%m-%d)
          echo "==> bumping $old -> $new (date: $today)"

          # version.txt — embedded into the binary as the local-fallback version.
          printf '%s\n' "$new" > internal/version/version.txt

          # CHANGELOG: insert dated section right after [Unreleased]. Preserves
          # the [Unreleased] header so future PRs always have a place to land.
          # Refuses if the previous prepare already inserted today's section
          # (idempotency guard — caller's branch-existence check is the primary
          # gate but this catches manual re-runs).
          if grep -Eq "^## \[{{.VERSION}}\]" CHANGELOG.md; then
            echo "FAIL: CHANGELOG.md already has a ## [{{.VERSION}}] section"
            exit 1
          fi
          awk -v ver="{{.VERSION}}" -v date="$today" '
            /^## \[Unreleased\]$/ {
              print
              print ""
              print "## [" ver "] - " date
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md

          # README.md — bump only the install-example lines, NOT the historical
          # roadmap bullets (`- [x] **vX.Y.Z:**`). Use targeted patterns rather
          # than a blanket s/$old/$new/g.
          sed -i.bak \
            -e "s|^\*\*Status: $old shipped\.\*\*|**Status: $new shipped.**|" \
            -e "s|sh -s -- -b ~/bin $old|sh -s -- -b ~/bin $new|" \
            -e "s|\"ubi:clintmod/rite\" = \"$old\"|\"ubi:clintmod/rite\" = \"$new\"|" \
            README.md
          rm -f README.md.bak

          # website/src — these files are pure install-example surface, no
          # historical-roadmap concern, so a global s/$old/$new/g per file is
          # safe. Strip the 'v' for the bare-semver `go:` mise example in
          # getting-started.md.
          old_bare="${old#v}"
          new_bare="${new#v}"
          for f in website/src/getting-started.md website/src/index.md website/src/ci.md website/src/special-vars.md; do
            sed -i.bak \
              -e "s|$old|$new|g" \
              -e "s|\"$old_bare\"|\"$new_bare\"|g" \
              "$f"
            rm -f "$f.bak"
          done

          echo "  bumped: internal/version/version.txt CHANGELOG.md README.md website/src/{getting-started,index,ci,special-vars}.md"
