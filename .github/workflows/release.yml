name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # goreleaser needs this to create GitHub releases on this repo

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: latest
          args: release --clean
        env:
          # Two tokens, two scopes:
          #   GITHUB_TOKEN   — auto-provided, scoped to clintmod/rite. Used
          #                    by goreleaser to create the release, upload
          #                    the archives, and push artifacts back to
          #                    this repo.
          #   HOMEBREW_TAP_TOKEN — our PAT, scoped to the tap repo.
          #                    Referenced by .goreleaser.yml's
          #                    brews.repository.token so the formula
          #                    commit goes to clintmod/homebrew-tap.
          # The split avoids broadening the PAT's scope to this repo —
          # keeps the blast radius small if the token ever leaks.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.GH_PAT }}
