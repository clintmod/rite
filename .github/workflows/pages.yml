name: Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Only one deploy at a time. Skip pending runs if a newer push arrives —
# docs builds are idempotent.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress site
        working-directory: website
        # DOCS_BASE matches the Pages sub-path clintmod.github.io/rite/.
        # Change (or drop) this if we add a CNAME pointing at a custom
        # domain — see website/.vitepress/config.ts.
        run: DOCS_BASE=/rite/ pnpm build

      - name: Hoist per-version public/ dirs into dist/<version>/
        # VitePress only hoists the root srcDir/public/ dir, so per-version
        # snapshots under website/src/{v*,next}/public/ never reach the
        # built site without this step. Copying after build exposes each
        # frozen schema at clintmod.github.io/rite/v<X.Y.Z>/schema.json
        # and the bleeding-edge one at /next/schema.json (closes #135).
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dir in website/src/v*/public website/src/next/public; do
            version=$(basename "$(dirname "$dir")")
            dest="website/.vitepress/dist/${version}"
            mkdir -p "$dest"
            cp -R "$dir"/. "$dest/"
            echo "hoisted $dir -> $dest"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
